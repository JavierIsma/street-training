<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Street Training</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="login-container">

    <div class="card">
      <h2>Registro Alumna</h2>

      <form id="registerForm">
        <input
          type="email"
          id="email"
          placeholder="Email"
          required
        >

        <div style="position: relative; margin-bottom: 15px; width: 100%;">
          <input
            type="password"
            id="password"
            placeholder="Contraseña"
            style="width: 100%; padding-right: 45px; margin-bottom: 0;"
            required
          >
          <button type="button" id="togglePassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem; outline: none; padding: 0;">👁️</button>
        </div>

        <div style="position: relative; margin-bottom: 15px; width: 100%;">
          <input
            type="password"
            id="confirmPassword"
            placeholder="Repetir Contraseña"
            style="width: 100%; padding-right: 45px; margin-bottom: 0;"
            required
          >
          <button type="button" id="toggleConfirmPassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem; outline: none; padding: 0;">👁️</button>
        </div>
        
        <input type="text" id="name" placeholder="Nombre completo" required>

        <input type="number" id="age" placeholder="Edad" required>

        <select id="gender" required>
          <option value="">Sexo</option>
          <option value="Femenino">Femenino</option>
          <option value="Masculino">Masculino</option>
          <option value="Otro">Otro</option>
        </select>

        <input type="text" id="experience" placeholder="Hace cuánto tiempo bailás" required>

        <textarea id="goals" placeholder="¿Cuáles son tus objetivos? (Ej: Mejorar mi freestyle, dominar el popping, tener más fluidez...)" required></textarea>

        <label>Estilos que manejás:</label>

        <div class="checkbox-group">
          <label><input type="checkbox" value="Hip Hop"> Hip Hop</label>
          <label><input type="checkbox" value="House"> House</label>
          <label><input type="checkbox" value="Popping"> Popping</label>
          <label><input type="checkbox" value="Locking"> Locking</label>
          <label><input type="checkbox" value="Dancehall"> Dancehall</label>
          <label><input type="checkbox" value="Lite Feet"> Lite Feet</label>
          <label><input type="checkbox" value="Krump"> Krump</label>
          <label><input type="checkbox" value="Breaking"> Breaking</label>
        </div>

        <p id="message"></p>
        
        <button type="submit" class="btn">Guardar perfil</button>

      </form>

      <div style="margin-top: 15px;">
        <a href="index.html" class="btn secondary-btn" style="display: block; text-align: center; text-decoration: none;">
          Volver al inicio
        </a>
      </div>

    </div>

  </main>

  <script type="module" src="js/register.js"></script>
</body>
</html>
